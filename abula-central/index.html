
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Àbulà Central — Ikoyi, Lagos</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --black:#111009;
  --deep:#1c1608;
  --maroon:#3d0f0a;
  --orange:#e8621a;
  --orange2:#ff7a2e;
  --cream:#f5ede0;
  --tan:#d4b896;
  --offwhite:#faf6f0;
  --muted:#7a6a55;
  --border:rgba(232,98,26,0.15);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Syne',sans-serif;background:var(--offwhite);color:var(--black);overflow-x:hidden;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:999;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 3rem;
  background:rgba(17,16,9,0.0);
  transition:background .4s, backdrop-filter .4s;
   }
  nav.scrolled{background:rgba(17,16,9,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-brand{display:flex;align-items:center;gap:.75rem;}
.nav-logo-img{width:38px;height:38px;object-fit:contain;border-radius:50%;}
.nav-name{
  font-family:'Libre Baskerville',serif;
  font-size:.95rem;font-weight:700;font-style:italic;
  color:var(--cream);letter-spacing:.02em;
}
  .nav-name span{color:var(--orange);}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none;}
.nav-links a{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(245,237,224,0.55);text-decoration:none;font-weight:700;transition:color .2s;}
.nav-links a:hover{color:var(--orange);}
.nav-cta{background:var(--orange);color:var(--black)!important;padding:.5rem 1.3rem;border-radius:1px;transition:background .2s!important;font-weight:800!important;}
.nav-cta:hover{background:var(--orange2)!important;}
  
#hero{
  min-height:100vh;
  position:relative;
  display:flex;flex-direction:column;justify-content:flex-end;
  overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:var(--deep);
}
.hero-food{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  filter:brightness(.45) contrast(1.1) saturate(.9);
  mix-blend-mode:luminosity;
  opacity:.7;
}
